<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How does time feel to you?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #faf9f7; color: #1a1a18; min-height: 100vh; }

    .header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .header h1 { font-size: 26px; font-weight: 500; color: #1a1a18; margin-bottom: 8px; }
    .header p { font-size: 15px; color: #5f5e5a; line-height: 1.6; max-width: 420px; margin: 0 auto; }

    .stations {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 1rem 1.25rem 3rem;
      max-width: 780px;
      margin: 0 auto;
    }

    .station-card { background: #ffffff; border: 1px solid #e5e4e0; border-radius: 14px; padding: 1.4rem; }
    .station-top { display: flex; align-items: center; gap: 10px; margin-bottom: 1.1rem; }
    .station-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; flex-shrink: 0; }
    .station-name { font-size: 17px; font-weight: 500; color: #1a1a18; }
    .station-subtitle { font-size: 12px; color: #5f5e5a; margin-top: 2px; }

    .time-row { margin-bottom: 14px; }
    .time-label { font-size: 12px; color: #5f5e5a; margin-bottom: 7px; }
    .stepper { display: flex; align-items: center; gap: 8px; }
    .step-btn { width: 38px; height: 38px; border: 1px solid #d3d1c7; border-radius: 10px; background: #f1efe8; color: #1a1a18; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; line-height: 1; transition: background 0.1s; }
    .step-btn:hover { background: #e5e3da; }
    .step-btn:active { transform: scale(0.94); }
    .step-val { font-size: 20px; font-weight: 500; color: #1a1a18; min-width: 44px; text-align: center; }
    .step-unit { font-size: 12px; color: #5f5e5a; }

    .submit-btn { width: 100%; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity 0.15s, transform 0.1s; color: #fff; }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.45; cursor: default; }

    .feedback-box { margin-top: 12px; border-radius: 10px; padding: 12px 14px; font-size: 14px; line-height: 1.6; display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>How does time feel to you?</h1>
  <p>Enter how long you actually spent at the activity, and how long it felt like.</p>
</div>

<div class="stations" id="stations"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNabUhQXMNgB5rLmTDgB8a7LBu6ASfuKM",
    authDomain: "solsticetimelab.firebaseapp.com",
    projectId: "solsticetimelab",
    storageBucket: "solsticetimelab.firebasestorage.app",
    messagingSenderId: "941162772365",
    appId: "1:941162772365:web:541e63a6066803a5362fc4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const THRESHOLD = 0.10;

  const STATIONS = [
    {
      id: 'awe', name: 'Awe', desc: 'Wonder & amazement',
      color: '#7F77DD', bg: '#EEEDFE', textColor: '#3C3489',
      getFeedback(pct, expanded, compressed) {
        if (expanded)   return `The moment opened up — time seemed abundant, stretching about ${pct}% beyond the clock!`;
        if (compressed) return `Time flew by — it felt about ${pct}% shorter than it actually was!`;
        return `Time was right on the dot — a balanced moment.`;
      }
    },
    {
      id: 'flow', name: 'Flow', desc: 'Deep focus & immersion',
      color: '#1D9E75', bg: '#E1F5EE', textColor: '#085041',
      getFeedback(pct, expanded, compressed) {
        if (compressed) return `Time slipped away without you noticing — it felt about ${pct}% shorter than it actually was!`;
        if (expanded)   return `Time slowed down — it felt about ${pct}% longer than it actually was!`;
        return `Time was right on the dot — a balanced moment.`;
      }
    },
    {
      id: 'boredom', name: 'Boredom', desc: 'Slow & uneventful',
      color: '#888780', bg: '#F1EFE8', textColor: '#2C2C2A',
      getFeedback(pct, expanded, compressed) {
        if (expanded)   return `Every minute stretched — time seemed to slow to a crawl, feeling about ${pct}% longer than it was!`;
        if (compressed) return `Time flew by — it felt about ${pct}% shorter than it actually was!`;
        return `Time was right on the dot — a balanced moment.`;
      }
    },
    {
      id: 'social', name: 'Social', desc: 'Connection & conversation',
      color: '#D4537E', bg: '#FBEAF0', textColor: '#72243E',
      getFeedback(pct, expanded, compressed) {
        if (expanded)   return `Time stretched — it felt about ${pct}% longer than it actually was!`;
        if (compressed) return `Time flew by — it felt about ${pct}% shorter than it actually was!`;
        return `Time was right on the dot — a balanced moment.`;
      }
    },
  ];

  const ICONS = { awe: '✦', flow: '◎', boredom: '—', social: '◈' };
  const state = {};
  STATIONS.forEach(s => { state[s.id] = { actual: 10, felt: 10, submitted: false }; });

  function fmt(n) { return Math.round(n); }
  function getDistortion(actual, felt) { return (felt - actual) / actual; }

  function buildStations() {
    const container = document.getElementById('stations');
    STATIONS.forEach(s => {
      const card = document.createElement('div');
      card.className = 'station-card';
      card.innerHTML = `
        <div class="station-top">
          <div class="station-icon" style="background:${s.bg}; color:${s.textColor};">${ICONS[s.id]}</div>
          <div>
            <div class="station-name">${s.name}</div>
            <div class="station-subtitle">${s.desc}</div>
          </div>
        </div>
        <div class="time-row">
          <div class="time-label">Actual time spent</div>
          <div class="stepper">
            <button class="step-btn" onclick="step('${s.id}','actual',-1)">−</button>
            <div><span class="step-val" id="actual-${s.id}">10</span> <span class="step-unit">min</span></div>
            <button class="step-btn" onclick="step('${s.id}','actual',1)">+</button>
          </div>
        </div>
        <div class="time-row">
          <div class="time-label">How long it felt</div>
          <div class="stepper">
            <button class="step-btn" onclick="step('${s.id}','felt',-1)">−</button>
            <div><span class="step-val" id="felt-${s.id}">10</span> <span class="step-unit">min</span></div>
            <button class="step-btn" onclick="step('${s.id}','felt',1)">+</button>
          </div>
        </div>
        <button class="submit-btn" id="btn-${s.id}" onclick="submitData('${s.id}')" style="background:${s.color};">Share my experience</button>
        <div class="feedback-box" id="fb-${s.id}"></div>
      `;
      container.appendChild(card);
    });
  }

  window.step = function(id, field, delta) {
    if (state[id].submitted) return;
    const newVal = Math.max(1, state[id][field] + delta);
    state[id][field] = newVal;
    document.getElementById(field + '-' + id).textContent = newVal;
  };

  window.submitData = async function(id) {
    if (state[id].submitted) return;
    const actual = state[id].actual;
    const felt   = state[id].felt;
    state[id].submitted = true;

    const btn = document.getElementById('btn-' + id);
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const distortion = getDistortion(actual, felt);
    const absPct     = fmt(Math.abs(distortion) * 100);
    const expanded   = distortion >  THRESHOLD;
    const compressed = distortion < -THRESHOLD;

    try {
      await addDoc(collection(db, 'submissions'), {
        station: id, actual, felt, distortion, timestamp: Date.now()
      });
      btn.textContent = 'Submitted ✓';
    } catch (e) {
      btn.textContent = 'Error — try again';
      btn.disabled = false;
      state[id].submitted = false;
      return;
    }

    const s   = STATIONS.find(x => x.id === id);
    const msg = s.getFeedback(absPct, expanded, compressed);
    const fb  = document.getElementById('fb-' + id);
    fb.style.display    = 'block';
    fb.style.background = s.bg;
    fb.style.color      = s.textColor;
    fb.style.border     = '1px solid ' + s.color + '55';
    fb.textContent      = msg;
  };

  buildStations();
</script>
</body>
</html>
