<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solstice Time Lab — Live Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #0e0e0c; color: #f0ede6; overflow: hidden; }

    .page { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 2vw 2.5vw; gap: 1.5vh; }

    /* ── TOP BAR ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; }

    .mit-logo { display: flex; align-items: baseline; font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; line-height: 1; letter-spacing: -0.02em; color: #f0ede6; }
    .mit-logo .mit { font-size: 1.6vw; }
    .mit-logo .mus { font-size: 0.9vw; display: flex; flex-direction: column; line-height: 1.2; margin-left: 0.3vw; }

    .title-block { text-align: center; }
    .site-title  { font-size: 1.8vw; font-weight: 600; color: #f0ede6; letter-spacing: -0.01em; }
    .site-date   { font-size: 0.85vw; color: #6b6960; margin-top: 2px; }

    .live-badge  { display: flex; align-items: center; gap: 7px; font-size: 0.9vw; color: #6b6960; }
    .live-dot    { width: 8px; height: 8px; border-radius: 50%; background: #3AAA35; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── STATIONS GRID ── */
    .stations-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5vw; align-items: stretch; }

    .station-panel { background: #1a1a17; border: 1px solid #2a2a26; border-radius: 14px; padding: 1.8vh 1.5vw; display: flex; flex-direction: column; gap: 1.5vh; }

    .station-header { display: flex; align-items: center; gap: 0.8vw; }
    .station-icon-wrap { width: 2.6vw; height: 2.6vw; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .station-icon-wrap svg { width: 55%; height: 55%; }
    .station-name { font-size: 1.4vw; font-weight: 600; color: #f0ede6; }
    .station-desc { font-size: 0.72vw; color: #6b6960; margin-top: 2px; line-height: 1.4; }

    .spectrum-section { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 1vh; }
    .spectrum-labels  { display: flex; justify-content: space-between; font-size: 0.72vw; color: #6b6960; }
    .spectrum-label-center { text-align: center; flex: 1; color: #4a4a45; }

    .spectrum-track-wrap { position: relative; height: 2.2vh; display: flex; align-items: center; }
    .spectrum-track { position: relative; width: 100%; height: 7px; background: #2a2a26; border-radius: 20px; overflow: visible; }
    .spectrum-fill-left  { position: absolute; top: 0; right: 50%; height: 100%; border-radius: 20px 0 0 20px; transition: width 0.7s ease; }
    .spectrum-fill-right { position: absolute; top: 0; left: 50%; height: 100%; border-radius: 0 20px 20px 0; transition: width 0.7s ease; }
    .spectrum-center-line { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 2px; height: 17px; background: #4a4a45; border-radius: 2px; }
    .dots-layer  { position: absolute; top: -6px; left: 0; right: 0; height: 20px; }
    .person-dot  { position: absolute; width: 13px; height: 13px; border-radius: 50%; border: 2px solid #1a1a17; transform: translateX(-50%); transition: left 0.6s ease; }
    .avg-marker  { position: absolute; top: -9px; width: 4px; height: 25px; border-radius: 3px; transform: translateX(-50%); transition: left 0.6s ease; }

    .stats-row   { display: flex; justify-content: space-between; align-items: flex-end; }
    .stat-label  { font-size: 0.65vw; color: #6b6960; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value  { font-size: 1.2vw; font-weight: 600; color: #f0ede6; }
    .stat-unit   { font-size: 0.7vw; color: #6b6960; margin-left: 3px; }
    .count-badge { font-size: 0.75vw; color: #6b6960; background: #2a2a26; border-radius: 20px; padding: 3px 9px; }

    .no-data { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.85vw; color: #3a3a36; font-style: italic; }

    /* ── FOOTER ── */
    .footer { display: flex; justify-content: center; align-items: center; font-size: 0.75vw; color: #3a3a36; }
    .footer span { color: #4a4a45; }
  </style>
</head>

      <path d="M3 19 Q6.5 16 10 19 Q13.5 22 17 19 Q20.5 16 24 19"/>
    </svg>`,
    awe: `<svg viewBox="0 0 26 26" fill="none" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round">
      <path d="M5 18 Q13 8 21 18"/>
      <line x1="5" y1="20" x2="21" y2="20"/>
      <line x1="13" y1="15" x2="13" y2="10"/>
      <line x1="9"  y1="16" x2="7"  y2="12"/>
      <line x1="17" y1="16" x2="19" y2="12"/>
      <line x1="7"  y1="18" x2="4"  y2="16"/>
      <line x1="19" y1="18" x2="22" y2="16"/>
    </svg>`,
  };

  const STATIONS = [
    { id: 'boredom', name: 'Boredom', desc: 'Slow & uneventful',         color: '#F26522', darkColor: '#C44D0E' },
    { id: 'social',  name: 'Social',  desc: 'Connection & conversation', color: '#F7C400', darkColor: '#B38B00' },
    { id: 'flow',    name: 'Flow',    desc: 'Deep focus & immersion',    color: '#3AAA35', darkColor: '#267322' },
    { id: 'awe',     name: 'Awe',     desc: 'Wonder & amazement',        color: '#6DC6E7', darkColor: '#2A8BB0' },
  ];

  function fmt(n) { return Math.round(n); }
  function getDistortion(actual, felt) { return (felt - actual) / actual; }
  function pctToLeft(distortion) {
    const clamped = Math.max(-1, Math.min(1, distortion));
    return 50 - clamped * 46;
  }

  function buildPanels() {
    const grid = document.getElementById('stations-grid');
    STATIONS.forEach(s => {
      const panel = document.createElement('div');
      panel.className = 'station-panel';
      panel.id = 'panel-' + s.id;
      panel.innerHTML = `
        <div class="station-header">
          <div class="station-icon-wrap" style="background:${s.color};">${ICONS[s.id]}</div>
          <div>
            <div class="station-name">${s.name}</div>
            <div class="station-desc">${s.desc}</div>
          </div>
        </div>
        <div id="content-${s.id}">
          <div class="no-data">Waiting for responses...</div>
        </div>
      `;
      grid.appendChild(panel);
    });
  }

  function renderStation(s, vals) {
    const content = document.getElementById('content-' + s.id);
    if (vals.length === 0) {
      content.innerHTML = `<div class="no-data">Waiting for responses...</div>`;
      return;
    }

    const avg     = vals.reduce((a, b) => a + b, 0) / vals.length;
    const avgLeft = pctToLeft(avg);
    const avgPct  = fmt(Math.abs(avg) * 100);
    let directionWord, avgDisplay;
    if (avg > THRESHOLD)       { directionWord = 'stretched';  avgDisplay = `+${avgPct}%`; }
    else if (avg < -THRESHOLD) { directionWord = 'flew';       avgDisplay = `−${avgPct}%`; }
    else                       { directionWord = 'on the dot'; avgDisplay = `on the dot`; }

    const fillLeft  = avg > 0 ? Math.min(46, avg * 46) : 0;
    const fillRight = avg < 0 ? Math.min(46, Math.abs(avg) * 46) : 0;

    const dotsHTML = vals.map(v => {
      const left = pctToLeft(v);
      return `<div class="person-dot" style="left:${left}%;background:${s.color};opacity:0.75;"></div>`;
    }).join('');

    content.className = 'spectrum-section';
    content.innerHTML = `
      <div class="spectrum-labels">
        <span>time stretched</span>
        <span class="spectrum-label-center">on the dot</span>
        <span>time flew</span>
      </div>
      <div class="spectrum-track-wrap">
        <div class="spectrum-track">
          <div class="spectrum-fill-left"  style="width:${fillLeft}%;background:${s.color};opacity:0.25;"></div>
          <div class="spectrum-fill-right" style="width:${fillRight}%;background:${s.color};opacity:0.25;"></div>
          <div class="spectrum-center-line"></div>
          <div class="dots-layer">${dotsHTML}</div>
          <div class="avg-marker" style="left:${avgLeft}%;background:${s.color};"></div>
        </div>
      </div>
      <div class="stats-row">
        <div>
          <div class="stat-label">Group average</div>
          <div class="stat-value" style="color:${s.color}">
            ${avgDisplay === 'on the dot'
              ? `<span style="font-size:0.95vw">on the dot</span>`
              : `${avgDisplay}<span class="stat-unit">${directionWord}</span>`}
          </div>
        </div>
        <div class="count-badge">${vals.length} ${vals.length === 1 ? 'response' : 'responses'}</div>
      </div>
    `;
  }

  buildPanels();

  const q = query(collection(db, 'submissions'));
  onSnapshot(q, snapshot => {
    const byStation = {};
    STATIONS.forEach(s => { byStation[s.id] = []; });
    snapshot.docs.forEach(doc => {
      const d = doc.data();
      if (byStation[d.station] !== undefined) {
        byStation[d.station].push(getDistortion(d.actual, d.felt));
      }
    });
    STATIONS.forEach(s => renderStation(s, byStation[s.id]));
  });
</script>
</body>
</html>
